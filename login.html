<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab 3 — Autentificare</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="light">

<nav>
  <div class="nav-inner">
    <a href="index.html" class="brand">// lab3</a>
    <a href="index.html">🏠 Acasă</a>
    <a href="preferences.html">⚙️ Preferințe</a>
    <a href="cookies-info.html">🍪 Cookies Info</a>
    <a href="login.html" class="active">🔐 Autentificare</a>
    <button class="theme-toggle" onclick="toggleTheme()">🌙 Temă</button>
  </div>
</nav>

<div class="container">
  <div class="hero">
    <h1>🔐 <span>Autentificare</span></h1>
    <p>Conectează-te la contul tău pentru a accesa dashboard-ul.</p>
  </div>

  <div class="card" style="max-width: 440px; margin: 0 auto;">
    <h2><span class="icon">👤</span> Conectare</h2>
    <div id="alert-box" class="alert"></div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="admin sau student" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="password">Parolă</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <div class="form-group">
        <div class="checkbox-row">
          <input type="checkbox" id="remember">
          <label for="remember" style="text-transform:none; letter-spacing:normal; font-size:0.9rem; color:inherit;">Ține-mă minte</label>
        </div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">
        🚀 Conectare
      </button>
    </form>

    <hr>

    <div style="text-align:center;">
      <p style="font-size:0.85rem; color:var(--muted);">Nu ai cont?
        <a href="register.html" style="color:var(--accent); font-weight:700;">Înregistrează-te →</a>
      </p>
    </div>

    <hr>

    <div style="background:var(--code-bg); border-radius:var(--radius); padding:14px; font-size:0.82rem;">
      <p style="font-weight:700; margin-bottom:8px; color:var(--muted);">🧪 Conturi de test:</p>
      <p style="font-family:'JetBrains Mono', monospace;">admin / password</p>
      <p style="font-family:'JetBrains Mono', monospace;">student / student123</p>
    </div>
  </div>

  <div class="page-footer">
    <span>Laborator 3 — Login</span>
    <a href="index.html" class="btn btn-secondary btn-sm">← Înapoi acasă</a>
  </div>
</div>

<script src="js/cookies.js"></script>
<script src="js/storage.js"></script>
<script src="js/login.js"></script>

</body>
</html>
